<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – GymJIMC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-body">

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <p class="pixel login-logo">GymJIMC</p>
      <h1>Admin Panel</h1>
      <p class="login-sub">Přihlaš se pro správu obsahu webu.</p>
      <div id="login-error" class="login-error" style="display:none;"></div>
      <input type="password" id="password-input" placeholder="Heslo" class="input-field" />
      <button class="btn-primary" style="width:100%;margin-top:1rem;" onclick="doLogin()">Přihlásit se</button>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="admin-panel" style="display:none;">
    <aside class="sidebar">
      <p class="pixel sidebar-logo">GymJIMC<br/><span style="color:var(--text-muted);font-size:.4rem;">Admin</span></p>
      <nav class="sidebar-nav">
        <a href="#" class="sidebar-link active" data-tab="events">📅 Eventy</a>
        <a href="#" class="sidebar-link" data-tab="texts">✏️ Texty</a>
        <a href="#" class="sidebar-link logout" onclick="doLogout()">🚪 Odhlásit</a>
      </nav>
    </aside>

    <main class="admin-main">

      <!-- EVENTS TAB -->
      <div id="tab-events" class="tab-content">
        <div class="tab-header">
          <h2 class="pixel" style="font-size:.75rem;">Eventy</h2>
          <button class="btn-primary" style="font-size:.55rem;padding:.6rem 1.2rem;" onclick="openAddEvent()">+ Přidat event</button>
        </div>

        <div id="events-list" class="admin-list">
          <div class="loading-spinner">Načítám…</div>
        </div>
      </div>

      <!-- TEXTS TAB -->
      <div id="tab-texts" class="tab-content" style="display:none;">
        <div class="tab-header">
          <h2 class="pixel" style="font-size:.75rem;">Texty webu</h2>
          <button class="btn-primary" style="font-size:.55rem;padding:.6rem 1.2rem;" onclick="saveTexts()">💾 Uložit vše</button>
        </div>

        <div class="texts-group">
          <h3 class="group-title">Hlavička</h3>
          <label>Název serveru (nadpis)</label>
          <input type="text" id="txt-hero-title" class="input-field" />
          <label>Podnadpis</label>
          <input type="text" id="txt-hero-subtitle" class="input-field" />
          <label>Adresa serveru</label>
          <input type="text" id="txt-server-address" class="input-field" />
        </div>

        <div class="texts-group">
          <h3 class="group-title">Sekce „Jak se připojit"</h3>
          <label>Úvodní text</label>
          <textarea id="txt-join-intro" class="input-field textarea"></textarea>
          <label>Text kroku 4</label>
          <textarea id="txt-join-step4" class="input-field textarea"></textarea>
          <label>Info box (poznámka)</label>
          <textarea id="txt-join-note" class="input-field textarea"></textarea>
        </div>

        <div class="texts-group">
          <h3 class="group-title">Sekce Voicechat</h3>
          <label>Úvod voicechat</label>
          <textarea id="txt-vc-intro" class="input-field textarea"></textarea>
          <label>Popis instalace</label>
          <textarea id="txt-vc-desc" class="input-field textarea"></textarea>
          <label>Info box voicechat</label>
          <textarea id="txt-vc-note" class="input-field textarea"></textarea>
        </div>

        <div id="save-status" class="save-status" style="display:none;"></div>
      </div>

    </main>
  </div>

  <!-- EVENT MODAL -->
  <div id="event-modal" class="modal-overlay" style="display:none;">
    <div class="modal-card">
      <h3 class="pixel" style="font-size:.65rem;margin-bottom:1.5rem;" id="modal-title">Přidat event</h3>
      <input type="hidden" id="event-id" />
      <label>Název eventu</label>
      <input type="text" id="event-title" class="input-field" placeholder="Např. Stavitelský turnaj" />
      <label>Datum</label>
      <input type="date" id="event-date" class="input-field" />
      <label>Čas (volitelné)</label>
      <input type="text" id="event-time" class="input-field" placeholder="Např. 17:00" />
      <label>Popis</label>
      <textarea id="event-desc" class="input-field textarea" placeholder="Krátký popis eventu…"></textarea>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Zrušit</button>
        <button class="btn-primary" style="font-size:.55rem;" onclick="saveEvent()">Uložit</button>
      </div>
      <div id="modal-error" class="login-error" style="display:none;margin-top:1rem;"></div>
    </div>
  </div>

  <!-- DELETE CONFIRM MODAL -->
  <div id="delete-modal" class="modal-overlay" style="display:none;">
    <div class="modal-card" style="max-width:380px;">
      <h3 class="pixel" style="font-size:.65rem;margin-bottom:1rem;">Smazat event?</h3>
      <p style="color:var(--text-muted);margin-bottom:1.5rem;">Tato akce je nevratná.</p>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeDeleteModal()">Zrušit</button>
        <button class="btn-danger" onclick="confirmDelete()">Smazat</button>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
